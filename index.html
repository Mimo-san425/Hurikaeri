<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>常任委員会のふりかえり</title>

<style>
body{
  font-family:"UD デジタル 教科書体 N-R","Hiragino Sans","Noto Sans JP",sans-serif;
  background:#fafafa;
}
.sheet{
  max-width:900px;
  margin:20px auto;
  background:#fff;
  border:1px solid #ccc;
  border-radius:12px;
  padding:20px;
}
h1{margin-top:0}

.step{
  border:1px solid #ddd;
  border-radius:10px;
  padding:15px;
  margin-bottom:15px;
}

textarea,input[type=text]{
  width:100%;
  font-size:16px;
  padding:8px;
  border-radius:6px;
  border:1px solid #bbb;
  box-sizing:border-box;
}
textarea{min-height:90px}

#result{
  min-height:300px;
}

.radio-group label{
  display:block;
  margin:6px 0;
  cursor:pointer;
}

ruby rt{
  font-size:0.55em;
}

button{
  padding:10px 14px;
  font-size:14px;
  border-radius:8px;
  border:1px solid #aaa;
  background:#f5f5f5;
  cursor:pointer;
  margin-right:6px;
}

/* 印刷（PDF）用 */
@media print{
  button{display:none;}
  body{background:#fff;}
  .sheet{border:none;}
}
</style>
</head>

<body>
<div class="sheet">

  <h1>
    <ruby>常任委員会<rt>じょうにんいいんかい</rt></ruby>のふりかえりを
    <ruby>書<rt>か</rt></ruby>こう
  </h1>

  <h2>① <ruby>常任委員会<rt>じょうにんいいんかい</rt></ruby>で<ruby>司会<rt>しかい</rt></ruby>や<ruby>書記<rt>しょき</rt></ruby>をしましたか

<h2>

    <div class="radio-group">
      <label><input type="radio" name="choice" value="司会"><ruby>司会<rt>しかい</rt></ruby></label>
      <label><input type="radio" name="choice" value="書記"><ruby>書記<rt>しょき</rt></ruby></label>
　　　<label><input type="radio" name="choice" value="両方"><ruby>両方<rt>りょうほう</rt></ruby></label>
　　　<label><input type="radio" name="choice" value="どちらもやっていない"><ruby>どちらもやっていない</ruby></label>
          
  </div>

  <div class="step">
    <h2>② <ruby>常任委員会<rt>じょうにんいいんかい</rt></ruby>で<ruby>やったことを<ruby>書<rt>か</rt></ruby>きましょう。</h2>


    <p style="margin:6px 0 8px; color:#444;">
      （例：<u>月の目標を考える</u>／<u>目標をていねいに書く</u>）
    </p>
    <input type="text" id="action" placeholder="（例：月の目標を考える／目標をていねいに書く">
  </div>

  <div class="step">
    <h2>③ <ruby>来年度<rt>らいねんど</rt></ruby>の<ruby>常任委員会<rt>じょうにんいいんかい</rt>へのアドバイス</ruby></h2>
    <input type="text" id="reason" placeholder="自由に入力" >
      </label>
    </div>
  </div>

  
  <div class="step">
    <h2><ruby>感想<rt>かんそう</rt></ruby>のまとめ</h2>
    <button type="button" onclick="build()">まとめる</button>
    <button type="button" onclick="makePDF()">PDFにする</button>
    <textarea id="result" readonly placeholder="ここに文章が表示されます"></textarea>
  </div>

</div>

<script>
/* ④「その他」を選んだときだけテキスト入力を有効化 */
(function(){
  const radios = document.querySelectorAll('input[name="feeling"]');
  const otherRadio = document.getElementById('feelingOtherRadio');
  const otherText  = document.getElementById('feelingOtherText');

  function syncOther(){
    const selected = document.querySelector('input[name="feeling"]:checked');
    const isOther = selected && selected.value === '__other__';
    otherText.disabled = !isOther;
    if(!isOther){ otherText.value = ""; }
    if(isOther){ otherText.focus(); }
  }

  radios.forEach(r => r.addEventListener('change', syncOther));
})();

function build(){
  const actionRaw = document.getElementById("action").value.trim();
  const reasonRaw = document.getElementById("reason").value.trim();
  const g = document.querySelector('input[name="choice"]:checked');

  // ④ 単一選択の気持ち
  const f = document.querySelector('input[name="feeling"]:checked');
  const otherText = document.getElementById('feelingOtherText').value.trim();

  let text = [];

  // ① 作業学習
  if(g){
    text.push(`わたしは「${g.value}」の作業学習をしました。`);
  }

  // ② やったこと → 「…をしました。」に自動整形
  if(actionRaw){
    const action = normalizeActionToSuru(actionRaw);
    if(g){
      text.push(`その作業で、${action}をしました。`);
    } else {
      text.push(`${action}をしました。`);
    }
  }

  // ④ 気持ち（単一）
  let feelingOut = "";
  if(f){
    feelingOut = f.value === '__other__' ? (otherText || "") : f.value;
    if(feelingOut){
      text.push(`そのときの気持ちは、${feelingOut}です。`);
    }
  }

  // ⑤ 理由（あれば追加）→ 「その理由は、〜です。」
  const reason = normalizeReason(reasonRaw);
  if(reason){
    text.push(`その理由は、${reason}です。`);
  }

  document.getElementById("result").value = text.join("\n\n");
}

/**
 * ②の入力を「〜をしました」に自然につなぐための軽い前処理
 * - 文末の句点削除
 * - 「しました／した／して／する」等の重複を避ける
 */
function normalizeActionToSuru(str){
  let s = str.replace(/[。．.]+$/,'').trim();
  s = s.replace(/(しました|した|して|する)\s*$/,'').trim();
  return s || str.trim();
}

/**
 * ⑤ 理由の末尾句点の整理（「〜から」「〜ため」などでもOK）
 * - 末尾の句点を削るだけに留め、文意は保持
 */
function normalizeReason(str){
  return str.replace(/[。．.]+$/,'').trim();
}

/* PDF化 */
function makePDF(){
  build();
  window.print();
}
</script>

</body>
</html>
